<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css" />
    <title>Conecta Aí</title>
</head>
<body>

    <main>

        <section>
        <article class="cartao">
            <div class="cartao-interno">

                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRAB1j92aXGHTtQeTFKfDiUgGWblc_DEPFhosbsr0rFoQ&s=10" alt="Dexter" class="cartao-imagem">

        </article>
<article class="cartao">

                    <p>Pinguins não voam, mas são excelentes nadadores.</p>

        </section>

    <footer>
