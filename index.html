<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css" />
    <title>Conecta Aí</title>
</head>
<body>

        <nav>

    <main>

        <section>
        <article class="cartao">
            <div class="cartao-interno">

<article class="cartao">
            <div class="cartao-interno">

        </section>

    <footer>
        <p>Projeto feito por Bianca</p>
