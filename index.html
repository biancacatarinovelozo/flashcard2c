<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Conecta Aí</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Confere Aí</h1>
        <nav>
            <a href="#" class="cabecalho-link">Inicio</a>
        </nav>
    </header>
    <main>
        <h2>Descubra a verdade passando o mouse</h2>
        <section>
        <article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRAB1j92aXGHTtQeTFKfDiUgGWblc_DEPFhosbsr0rFoQ&s=10" alt="Dexter" class="cartao-imagem">
                    <p>Dexter um assasino em serie!</p>
                </div>
                <div class="cartao-verso">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTfBiUVum-lseFfQANgC1zTA4iK3o_VSf9mKS1Qb7YFVzzUZNIc3nqzE5Ex&s=10" alt="Dexter"  class="cartao-imagem">
                    <p>Dexter muito esperto e agil.</p>
                </div>
            </div>
        </article>
<article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://www.adorocinema.com/series/serie-30429/" alt="Dexter" class="cartao-imagem">
                    <p> Dexter: New Blood !</p>
                </div>
                <div class="cartao-verso">

                    <p>Dexter tem um filho perdido.</p>
                </div>
            </div>
        </article>

        </section>
    </main>
    <footer>
        <p>Projeto feito por Vivi</p>
    </footer>
</body>
</html>
